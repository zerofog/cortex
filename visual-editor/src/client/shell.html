<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortex Visual Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    .shell {
      display: flex;
      height: 100vh;
    }
    .shell-viewport {
      flex: 1;
      border: none;
    }
    #panel-mount {
      width: 320px;
      flex-shrink: 0;
      border-left: 1px solid #e0e0e0;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div class="shell">
    <!--
      M26: Sandbox tradeoff — allow-same-origin + allow-scripts together means the
      iframe can remove its own sandbox attribute (XSS risk). Accepted because:
      1) This is a dev-only tool running on loopback
      2) The iframe loads the user's own app, which already runs with full privileges
      3) Without allow-same-origin, localStorage/cookies/service-workers break completely
      M31: OAuth redirects in sandboxed iframes may fail if the IdP uses frame-busting
      or X-Frame-Options. Users encountering login issues should open the app directly.
    -->
    <iframe class="shell-viewport" title="Application preview" sandbox="allow-same-origin allow-scripts allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-downloads allow-top-navigation-by-user-activation allow-storage-access-by-user-activation"></iframe>
    <div id="panel-mount"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    let path = params.get('path') || '/';
    if (!path.startsWith('/') || path.startsWith('//') || path.toLowerCase().startsWith('javascript:')) path = '/';
    document.querySelector('.shell-viewport').src = path;
  </script>
  <script src="/__zerofog/client/panel.js"></script>
</body>
</html>
