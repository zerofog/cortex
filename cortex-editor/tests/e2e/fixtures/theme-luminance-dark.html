    <!--
      Fixture for ZF0-1562: exercises the luminance fallback branch of
      detectTheme() (src/browser/index.tsx:42-54). Body bg luminance ≈ 0.04
      (well under the 0.4 threshold) → host should receive data-theme="blueprint".

      Deliberately no html.class, no data-theme, no data-mode — the cascade
      must fall through to luminance, not short-circuit on an explicit signal.
      Spec sets prefers-color-scheme=light via test.use({colorScheme:'light'})
      at the describe level (a browser-context option applied at context
      creation, not page.emulateMedia) so matchMedia doesn't short-circuit
      before the luminance branch either.
    -->
