<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cortex E2E Fixture</title>
  </head>
  <body>
    <!--
      Seed element used by override-lifecycle specs (ZF0-1314 / 1315 / 1316).
      Business purpose: every spec mutates `padding-top` and `color` on this
      element to exercise the full override → verify → divergence pipeline
      without depending on a real user app.
    -->
    <section
      id="center"
      data-cortex-source="fixture:1:1"
      style="padding-top: 10px; color: rgb(107, 99, 117);"
    >
      Fixture content
    </section>
    <!--
      Secondary seed element for multi-source panel specs (ZF0-1473 sub-A).
      Shares file path 'fixture' with #center after stripLineCol — a single
      hmr-applied message with files: ['fixture'] reconciles both elements.
      Inline styles match #center's pattern so reconcile has a baseline value.

      INVARIANT NOTE for spec authors: the fixture now contains TWO elements
      with [data-cortex-source]. Older specs (override-canonicalization,
      override-divergence-card, override-retry-window, smoke) all key off
      FIXTURE_SEED_SELECTOR (#center) and FIXTURE_SEED_SOURCE (fixture:1:1)
      explicitly — DO NOT use ambient selectors like
      `[data-cortex-source]` or `body > [data-cortex-source]` and expect
      a single match. Always use #center / #left explicitly via
      FIXTURE_SEED_* / FIXTURE_SECONDARY_* constants from fixture-server.ts.
    -->
    <div
      id="left"
      data-cortex-source="fixture:2:1"
      style="padding-top: 10px; color: rgb(107, 99, 117);"
    >
      Fixture secondary
    </div>
    <!--
      Shared-source list for blast-radius banner specs (ZF0-1584).
      Business purpose: three <li> elements rendered from the SAME source
      location simulate a .map()-rendered list. detectSharedSource() returns
      count=3 for any of these elements, causing Panel to show the
      "Used by N elements" banner (SharedSourceInfo path, ZF0-1583).

      All three share data-cortex-source="fixture:map:1" — the same value
      a real JSX source transform would emit for every iteration of a
      .map() call at that source line. The first item (#map-item-0) is
      used as the selected element in the spec; the other two (#map-item-1,
      #map-item-2) are the "siblings" that receive data-cortex-blast-radius.

      INVARIANT: do NOT change these source values without updating
      FIXTURE_MAP_SOURCE in helpers/fixture-server.ts.
    -->
    <ul id="map-list">
      <li id="map-item-0" data-cortex-source="fixture:map:1">Item A</li>
      <li id="map-item-1" data-cortex-source="fixture:map:1">Item B</li>
      <li id="map-item-2" data-cortex-source="fixture:map:1">Item C</li>
    </ul>
    <script src="./cortex-bundle.js"></script>
  </body>
</html>
