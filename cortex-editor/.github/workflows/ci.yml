name: CI
on:
  push:
    branches: [main]
    paths: ['cortex-editor/**']
  pull_request:
    branches: [main]
    paths: ['cortex-editor/**']

permissions:
  contents: read

defaults:
  run:
    working-directory: cortex-editor

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: cortex-editor/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
